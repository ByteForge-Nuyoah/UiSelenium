name: UI Automation CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      env:
        description: '运行环境'
        default: 'test'
        type: choice
        options: [test, live]
      project:
        description: '项目名称'
        default: 'workspace'
        type: string

env:
  PROJECT: ${{ github.event.inputs.project || 'workspace' }}
  ENV: ${{ github.event.inputs.env || 'test' }}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - run: pip install -r requirements.txt

      - run: mkdir -p outputs/report outputs/image outputs/logs

      - name: Run tests
        run: |
          python run.py \
            -env ${{ env.ENV }} \
            -driver_type chrome-headless \
            -report yes \
            -open no \
            -project ${{ env.PROJECT }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: outputs/report
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots
          path: outputs/image

  notify:
    runs-on: ubuntu-latest
    needs: test
    if: failure()
    
    steps:
      - name: DingTalk
        if: ${{ secrets.DINGTALK_WEBHOOK != '' }}
        run: |
          curl -s -X POST "${{ secrets.DINGTALK_WEBHOOK }}" \
            -H 'Content-Type: application/json' \
            -d '{"msgtype":"text","text":{"content":"UI自动化测试失败\n仓库:${{ github.repository }}\n分支:${{ github.ref_name }}\n详情:${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}}'