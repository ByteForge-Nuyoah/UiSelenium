# 公共参数
case_common:
  allure_epic: workspace接口
  allure_feature: 用户模块
  allure_story: 登录接口
  case_markers: #
    - workspace
    - smoke
    - login: 登录接口

# 用例数据
case_info:
-
  id: workspace_login_01
  title: 用户名密码正确，登录成功
  run: True
  severity: normal
  url: /api/crm/v4/user/login
  method: POST
  headers:
    Content-Type: application/json; charset=utf-8;
  cookies:
  request_type: json
  payload:
    username: admin
    password: 123123
    appPlatform: work-space
    appVersion: 1.0.1
  files:
  assert_response:
    status_code: 200
    assertUserName:
      message: 断言接口返回的用户名
      expect_value: admin
      assert_type: ==
      type_jsonpath: $.data.user.username
  assert_sql:
  extract:
    type_re:
      nickname: \"username":"(.*?)"
      login: \"login":"(.*?)"
      user_id: \"user_id":(.*?),
    type_response:
      token: response.json["data"]["token"]
